apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  namespace: expense
  labels:
    name: app1
    tier: web
    project: expense  
spec:
  replicas: 1
  selector:
    matchLabels:
      name: app1
      tier: web
      project: expense
  template:
    metadata:
      labels:
        name: app1
        tier: web
        project: expense 
    spec:
      containers:
      - name: app1-expense
        image: vamsidocker012/app1:v1
---
apiVersion: v1
kind: Service
metadata:
  name: app1
  namespace: expense
  labels:  
    name: app1
    tier: web
    project: expense
spec:
  selector:
      name: app1
      tier: web
      project: expense
  ports:
    - name: frontend-ports
      protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: app1
    annotations:
      #kubernetes.io/ingress.class: alb
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:315069654700:certificate/eefec79d-8012-4e7e-a530-baf154b833f2
      alb.ingress.kubernetes.io/listen-ports: '[ {"HTTPS": 443}]'
      alb.ingress.kubernetes.io/tags: Environment=dev,Team=test
      alb.ingress.kubernetes.io/group.name: expense
spec:
    ingressClassName: alb
    rules:
    - host: "app1.daws81s.online"
      http:
        paths:
        - pathType: Prefix
          path: "/"
          backend:
            service:
              name: app1
              port:
                number: 80